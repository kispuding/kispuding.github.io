<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance It Out</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: linear-gradient(135deg, #de6161 0%, #a44aaa 50%, #2657eb 100%);
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ── Intro ────────────────────────────────────────────────────────────── */
#intro {
  position: fixed; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.7s ease;
}
#intro.out { opacity: 0; pointer-events: none; }

#card {
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 28px;
  padding: 44px 48px 40px;
  display: flex; flex-direction: column; gap: 24px;
  width: min(520px, 94vw);
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.25);
}
#card::-webkit-scrollbar { width: 4px; }
#card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 2px; }

#card h1 {
  color: #fff; font-size: 26px; font-weight: 300;
  letter-spacing: 1px; text-align: center;
}
#card h1 strong { font-weight: 700; }

/* top row: photo + name */
#top-row { display: flex; align-items: center; gap: 18px; }

#photo-ring {
  width: 90px; height: 90px; border-radius: 50%; flex-shrink: 0;
  border: 2px dashed rgba(255,255,255,0.45);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; cursor: pointer; overflow: hidden;
  background: rgba(255,255,255,0.08);
  transition: border-color 0.2s, background 0.2s;
}
#photo-ring:hover { border-color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.16); }
#photo-ring svg    { opacity: 0.6; }
#photo-ring span   { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
#photo-ring img    { width: 100%; height: 100%; object-fit: cover; display: none; }
#photo-file        { display: none; }

#name-inp {
  flex: 1;
  background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.32);
  border-radius: 14px; padding: 14px 18px;
  color: #fff; font-size: 16px; font-family: inherit;
  letter-spacing: 0.5px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
#name-inp::placeholder { color: rgba(255,255,255,0.38); }
#name-inp:focus { border-color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.19); }

/* song section */
#songs-section { display: flex; flex-direction: column; gap: 10px; }

.section-label {
  font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.55); padding-left: 2px;
}

#song-list {
  max-height: 195px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 4px;
  border-radius: 14px;
}
#song-list::-webkit-scrollbar { width: 4px; }
#song-list::-webkit-scrollbar-track { background: transparent; }
#song-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 2px; }

#songs-status {
  color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 0.5px;
  text-align: center; padding: 20px 0;
}
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.song-item {
  display: flex; align-items: center; gap: 13px;
  padding: 9px 14px; border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,0.06);
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.song-item:hover { background: rgba(255,255,255,0.13); }
.song-item.selected {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.45);
}
.song-item img {
  width: 44px; height: 44px; border-radius: 8px;
  object-fit: cover; flex-shrink: 0;
  background: rgba(255,255,255,0.1);
}
.song-meta { flex: 1; min-width: 0; }
.song-title  { color: #fff; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-check  { color: rgba(255,255,255,0.9); font-size: 16px; opacity: 0; flex-shrink: 0; }
.song-item.selected .song-check { opacity: 1; }

/* gradient picker */
#grad-section { display: flex; flex-direction: column; gap: 10px; }

#grad-swatches {
  display: flex; flex-wrap: wrap; gap: 7px;
}
.grad-swatch {
  width: 38px; height: 38px; border-radius: 50%;
  cursor: pointer; flex-shrink: 0;
  border: 2.5px solid transparent;
  outline: 2.5px solid transparent;
  transition: transform 0.15s, border-color 0.15s, outline-color 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.grad-swatch:hover  { transform: scale(1.12); }
.grad-swatch.active { border-color: #fff; outline-color: rgba(255,255,255,0.4); }
.grad-swatch-name   { /* tooltip via title attr */ }
#grad-status {
  color: rgba(255,255,255,0.45); font-size: 12px; text-align: center; padding: 4px 0;
}

/* go button */
#go-btn {
  width: 100%; padding: 15px;
  border-radius: 14px; border: none;
  background: #fff; color: #a44aaa;
  font-size: 14px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  opacity: 0.4; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
#go-btn.ready { opacity: 1; pointer-events: auto; }
#go-btn.ready:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.22); }
#go-btn.ready:active { transform: translateY(0); }

/* ── Canvas & HUD ─────────────────────────────────────────────────────── */
canvas { display: block; opacity: 0; transition: opacity 0.9s ease; }
canvas.on { opacity: 1; }

#dancer-name {
  position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.75); font-size: 14px; letter-spacing: 4px;
  text-transform: uppercase; pointer-events: none;
  opacity: 0; transition: opacity 1s ease 0.4s;
}
#dancer-name.on { opacity: 1; }

#now-playing {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 1.5px;
  pointer-events: none; white-space: nowrap;
  max-width: 80vw; overflow: hidden; text-overflow: ellipsis;
  opacity: 0; transition: opacity 1s ease 0.6s;
}
#now-playing.on { opacity: 1; }

#hint {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.28); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; pointer-events: none; white-space: nowrap;
  animation: breathe 3s ease-in-out infinite;
  opacity: 0; transition: opacity 1s ease 0.8s;
}
#hint.on { opacity: 1; }

@keyframes breathe { 0%,100%{opacity:.15} 50%{opacity:.55} }
#ripples { position: fixed; inset: 0; pointer-events: none; }
.ripple {
  position: absolute; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.55);
  transform: translate(-50%,-50%);
  animation: rout 0.9s ease-out forwards;
}
@keyframes rout { from{width:0;height:0;opacity:1} to{width:230px;height:230px;opacity:0} }
</style>
</head>
<body>

<!-- ── Intro ──────────────────────────────────────────────────────────────── -->
<div id="intro">
  <div id="card">
    <h1>ready to <strong>dance?</strong></h1>

    <div id="top-row">
      <div id="photo-ring">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>your face</span>
        <img id="photo-preview" alt="" />
      </div>
      <input type="file" id="photo-file" accept="image/*" />
      <input type="text" id="name-inp" placeholder="your name" maxlength="28" autocomplete="off" />
    </div>

    <div id="grad-section">
      <div class="section-label">pick your vibe</div>
      <div id="grad-swatches">
        <div id="grad-status"><span class="spin">⟳</span></div>
      </div>
    </div>

    <div id="songs-section">
      <div class="section-label">pick your beat</div>
      <div id="song-list">
        <div id="songs-status"><span class="spin">⟳</span>&nbsp; loading charts…</div>
      </div>
    </div>

    <button id="go-btn">let's dance</button>
  </div>
</div>

<div id="ripples"></div>
<div id="dancer-name"></div>
<div id="now-playing"></div>
<div id="hint">click anywhere · or press any key</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let photoDataURL    = null;
let selectedSong    = null;
let songsReady      = false;
let activeGradient  = 'linear-gradient(135deg, #de6161 0%, #a44aaa 50%, #2657eb 100%)';

// ── Intro: photo upload ───────────────────────────────────────────────────────
const photoRing    = document.getElementById('photo-ring');
const photoFile    = document.getElementById('photo-file');
const photoPreview = document.getElementById('photo-preview');
const nameInp      = document.getElementById('name-inp');
const goBtn        = document.getElementById('go-btn');

photoRing.addEventListener('click', () => photoFile.click());

photoFile.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataURL = ev.target.result;
    photoPreview.src = photoDataURL;
    photoPreview.style.display = 'block';
    photoRing.querySelector('svg').style.display  = 'none';
    photoRing.querySelector('span').style.display = 'none';
    refresh();
  };
  reader.readAsDataURL(file);
});

nameInp.addEventListener('input', refresh);

function refresh() {
  const ok = photoDataURL && nameInp.value.trim().length > 0 &&
             (!songsReady || selectedSong !== null);
  goBtn.classList.toggle('ready', !!ok);
}

goBtn.addEventListener('click', () => {
  if (!goBtn.classList.contains('ready')) return;
  launch(nameInp.value.trim(), photoDataURL, selectedSong);
});

// ── Gradient loading ──────────────────────────────────────────────────────────
function gradientCSS(colors) {
  if (colors.length === 1) return colors[0];
  const stops = colors.map((c, i) => `${c} ${Math.round(i / (colors.length - 1) * 100)}%`).join(', ');
  return `linear-gradient(135deg, ${stops})`;
}

async function loadGradients() {
  const swatchWrap = document.getElementById('grad-swatches');
  try {
    const res  = await fetch('https://raw.githubusercontent.com/ghosh/uiGradients/main/gradients.json');
    const all  = await res.json();

    // Always include Nepal first, then 9 random picks from the rest
    const nepal  = all.find(g => g.name === 'Nepal');
    const others = all.filter(g => g.name !== 'Nepal' && g.colors && g.colors.length >= 2);
    const picked = [nepal, ...others.sort(() => Math.random() - 0.5).slice(0, 9)].filter(Boolean);

    swatchWrap.innerHTML = '';
    picked.forEach((g, i) => {
      const css = gradientCSS(g.colors);
      const el  = document.createElement('div');
      el.className   = 'grad-swatch' + (i === 0 ? ' active' : '');
      el.style.background = css;
      el.title       = g.name;
      el.addEventListener('click', () => {
        swatchWrap.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        activeGradient = css;
        document.body.style.background = css;
      });
      swatchWrap.appendChild(el);
    });

    // Apply Nepal (first) as default
    if (picked[0]) {
      activeGradient = gradientCSS(picked[0].colors);
      document.body.style.background = activeGradient;
    }

  } catch (err) {
    swatchWrap.innerHTML = '<div id="grad-status" style="color:rgba(255,255,255,0.35);font-size:12px">couldn\'t load gradients</div>';
  }
}

// ── Song loading (iTunes chart + batch lookup) ────────────────────────────────
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// JSONP helper — bypasses CORS entirely (script tag injection)
function jsonp(url, callbackParam = 'callback') {
  return new Promise((resolve, reject) => {
    const name = '__jp_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
    function cleanup() { delete window[name]; script.remove(); clearTimeout(timer); }
    window[name] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('script error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + callbackParam + '=' + name;
    document.head.appendChild(script);
  });
}

async function loadSongs() {
  try {
    // Deezer chart JSONP — output=jsonp makes Deezer wrap in callback, no CORS involved
    const data = await jsonp(
      'https://api.deezer.com/chart/0/tracks?limit=10&output=jsonp',
      'callback'
    );

    if (data.error) throw new Error(data.error.message || 'deezer error');

    const songs = (data.data || []).filter(t => t.preview).map(t => ({
      id:      t.id,
      title:   t.title_short || t.title,
      artist:  t.artist.name,
      artwork: t.album.cover_medium,
      preview: t.preview,
    }));

    if (!songs.length) throw new Error('empty');
    renderSongs(songs);
  } catch (err) {
    document.getElementById('songs-status').innerHTML =
      '<span style="color:rgba(255,255,255,0.4)">couldn\'t load chart — you can still dance without music</span>';
    songsReady = false;
    refresh();
  }
}

function renderSongs(songs) {
  const list = document.getElementById('song-list');
  list.innerHTML = '';
  songs.forEach(song => {
    const item = document.createElement('div');
    item.className = 'song-item';
    item.innerHTML = `
      <img src="${esc(song.artwork)}" alt="" loading="lazy" />
      <div class="song-meta">
        <div class="song-title">${esc(song.title)}</div>
        <div class="song-artist">${esc(song.artist)}</div>
      </div>
      <div class="song-check">✓</div>`;
    item.addEventListener('click', () => {
      list.querySelectorAll('.song-item').forEach(s => s.classList.remove('selected'));
      item.classList.add('selected');
      selectedSong = song;
      refresh();
    });
    list.appendChild(item);
  });
  songsReady = true;
  refresh();
}

loadSongs();
loadGradients();

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x6a3a88, 0.038);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2.2, 9.5);
camera.lookAt(0, 2.0, 0);

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 30;
scene.add(sun);

const coralL = new THREE.PointLight(0xff7755, 1.4, 20);
coralL.position.set(-4, 5, 3);
scene.add(coralL);

const blueL = new THREE.PointLight(0x5577ff, 1.2, 18);
blueL.position.set(4, 3, -2);
scene.add(blueL);

// ── Material & helpers ────────────────────────────────────────────────────────
const bodyMat = new THREE.MeshStandardMaterial({
  color: 0xf2f8f5, roughness: 0.20, metalness: 0.04,
});

function cap(r, l) { return new THREE.Mesh(new THREE.CapsuleGeometry(r, l, 8, 20), bodyMat); }
function sph(r)    { return new THREE.Mesh(new THREE.SphereGeometry(r, 22, 18), bodyMat); }
function sh(m)     { m.castShadow = true; m.receiveShadow = true; return m; }

// ── Figure ────────────────────────────────────────────────────────────────────
const figure = new THREE.Group();
scene.add(figure);

const torso = sh(cap(0.30, 0.90)); torso.position.set(0,  2.3,  0); figure.add(torso);
const neck  = sh(cap(0.09, 0.16)); neck.position.set( 0,  2.94, 0); figure.add(neck);
const head  = sh(sph(0.34));       head.position.set( 0,  3.38, 0); figure.add(head);

const LSP = new THREE.Group(); LSP.position.set(-0.42, 2.84, 0); figure.add(LSP);
const LA  = sh(cap(0.09, 1.08)); LA.position.set(0, -0.64, 0); LSP.add(LA);

const RSP = new THREE.Group(); RSP.position.set( 0.42, 2.84, 0); figure.add(RSP);
const RA  = sh(cap(0.09, 1.08)); RA.position.set(0, -0.64, 0); RSP.add(RA);

const LHP = new THREE.Group(); LHP.position.set(-0.19, 1.80, 0); figure.add(LHP);
const LL  = sh(cap(0.12, 1.35)); LL.position.set(0, -0.775, 0); LHP.add(LL);

const RHP = new THREE.Group(); RHP.position.set( 0.19, 1.80, 0); figure.add(RHP);
const RL  = sh(cap(0.12, 1.35)); RL.position.set(0, -0.775, 0); RHP.add(RL);

// ── Audio & Beat Detection ────────────────────────────────────────────────────
let audioCtx    = null;
let analyser    = null;
let musicActive = false;
let lastBeatMs  = 0;
let beatsTotal  = 0;           // track how many beats we've actually detected

// Spectral-flux state
let prevEnergy  = 0;
const FLUX_WIN  = 24;          // ~0.4 s at 60 fps
const fluxBuf   = new Float32Array(FLUX_WIN);
let fluxIdx     = 0;

async function setupAudio(previewUrl) {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.55;   // snappy — lets beat transients through

    // Fetch as ArrayBuffer → decodeAudioData avoids HTMLAudio CORS issues
    const res    = await fetch(previewUrl);
    const arrBuf = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arrBuf);

    const src = audioCtx.createBufferSource();
    src.buffer = decoded;
    src.loop   = true;
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
    src.start(0);
    musicActive = true;

    // If 3 s in and still 0 beats → fall back to tempo grid
    setTimeout(() => { if (beatsTotal === 0) startTempoFallback(); }, 3000);

  } catch (err) {
    console.warn('Web Audio setup failed, using tempo fallback:', err);
    // Audio element for playback only (no analysis)
    const el = document.createElement('audio');
    el.src   = previewUrl;
    el.loop  = true;
    document.body.appendChild(el);
    el.play().catch(() => {});
    startTempoFallback();
  }
}

// Timer-based dance when beat detection can't run
function startTempoFallback() {
  const tick = () => {
    if (Math.random() > 0.2) triggerMove();
    setTimeout(tick, 420 + Math.random() * 160); // ~120–143 BPM feel
  };
  setTimeout(tick, 500);
}

function checkBeat() {
  if (!analyser || !musicActive) return false;

  const data = new Uint8Array(analyser.frequencyBinCount); // 256 bins
  analyser.getByteFrequencyData(data);

  // Bass energy: bins 0-6  (~0–500 Hz for a 512-point FFT at 44 kHz)
  let energy = 0;
  for (let i = 0; i < 7; i++) energy += data[i];
  energy /= 7;

  // Spectral flux = positive energy delta only
  const flux = Math.max(0, energy - prevEnergy);
  prevEnergy = energy;

  fluxBuf[fluxIdx % FLUX_WIN] = flux;
  fluxIdx++;
  let avgFlux = 0;
  for (let i = 0; i < FLUX_WIN; i++) avgFlux += fluxBuf[i];
  avgFlux /= FLUX_WIN;

  const now = Date.now();
  // Fire when flux spike is 1.4× its own running average, with a min cooldown
  if (flux > avgFlux * 1.4 && flux > 1.5 && now - lastBeatMs > 280) {
    lastBeatMs = now;
    beatsTotal++;
    return true;
  }
  return false;
}

// ── Launch ────────────────────────────────────────────────────────────────────
function launch(userName, photoURL, song) {
  document.getElementById('intro').classList.add('out');
  setTimeout(() => document.getElementById('intro').remove(), 800);

  renderer.domElement.classList.add('on');
  document.getElementById('dancer-name').textContent = userName;
  document.getElementById('dancer-name').classList.add('on');
  document.getElementById('hint').classList.add('on');

  if (song) {
    document.getElementById('now-playing').textContent =
      `♪  ${song.title}  —  ${song.artist}`;
    document.getElementById('now-playing').classList.add('on');
    setupAudio(song.preview);
  }

  // Face disc on head sphere
  new THREE.TextureLoader().load(photoURL, tex => {
    tex.colorSpace = THREE.SRGBColorSpace;
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(0.325, 64),
      new THREE.MeshBasicMaterial({ map: tex })
    );
    disc.position.set(0, 0, 0.342);
    head.add(disc);
  });

  document.addEventListener('click',   onClickEvt);
  document.addEventListener('keydown', onKeyEvt);
}

// ── Spring System ─────────────────────────────────────────────────────────────
const tgt = {
  LSP:{x:0,y:0,z:0}, RSP:{x:0,y:0,z:0},
  LHP:{x:0,y:0,z:0}, RHP:{x:0,y:0,z:0},
  fig:{x:0,y:0,z:0},
};
const vel = {
  LSP:{x:0,y:0,z:0}, RSP:{x:0,y:0,z:0},
  LHP:{x:0,y:0,z:0}, RHP:{x:0,y:0,z:0},
  fig:{x:0,y:0,z:0},
};
const posT = {x:0,z:0}, posV = {x:0,z:0}, posCur = {x:0,z:0};

// ── Dance Moves ───────────────────────────────────────────────────────────────
const MOVES = [
  () => { tgt.LSP.z = -2.8; },
  () => { tgt.RSP.z =  2.8; },
  () => { tgt.LHP.x = -1.5; tgt.LHP.z =  0.18; },
  () => { tgt.RHP.x = -1.5; tgt.RHP.z = -0.18; },
  () => { tgt.LSP.z = -3.0; tgt.RSP.z =  3.0; },
  () => { tgt.LSP.x = -1.4; },
  () => { tgt.RSP.x = -1.4; },
  () => { tgt.fig.z =  0.35; tgt.RSP.z =  2.2; tgt.LHP.x = 0.45; },
  () => { tgt.fig.z = -0.35; tgt.LSP.z = -2.2; tgt.RHP.x = 0.45; },
  () => { tgt.LSP.z = -2.3; tgt.RSP.z = 2.3; tgt.LHP.z = 0.7; tgt.RHP.z = -0.7; },
  () => { tgt.LSP.x =  1.6; },
  () => { tgt.RSP.x =  1.6; },
  () => { tgt.LHP.z =  1.2; },
  () => { tgt.RHP.z = -1.2; },
  () => { tgt.fig.y =  0.5; tgt.LSP.x = -1.1; tgt.RSP.x = -1.1; },
  () => { tgt.LHP.x = -1.3; tgt.RHP.x = -1.3; tgt.LSP.z = -0.9; tgt.RSP.z = 0.9; },
  () => { tgt.RSP.z =  2.6; tgt.LHP.x = -1.4; },
  () => { tgt.LSP.z = -2.6; tgt.RHP.x = -1.4; },
  () => { tgt.LHP.z =  1.0; tgt.RHP.z = -1.0; tgt.LSP.z = -0.6; tgt.RSP.z = 0.6; },
  () => { tgt.LSP.x =  1.3; tgt.RSP.x = 1.3; tgt.LHP.x = -1.0; tgt.RHP.x = -1.0; },
];

let retTimer = null, lastIdx = -1;

function resetAll() {
  for (const k in tgt) { tgt[k].x = 0; tgt[k].y = 0; tgt[k].z = 0; }
}

function triggerMove() {
  if (retTimer) clearTimeout(retTimer);
  resetAll();
  let idx;
  do { idx = Math.floor(Math.random() * MOVES.length); } while (idx === lastIdx);
  lastIdx = idx;
  MOVES[idx]();

  posT.x = (Math.random() - 0.5) * 3.8;
  posT.z = (Math.random() - 0.5) * 1.0;

  bodyMat.emissive.setHex(0x441133);
  bodyMat.emissiveIntensity = 0.45;
  setTimeout(() => { bodyMat.emissive.setHex(0); bodyMat.emissiveIntensity = 0; }, 160);

  retTimer = setTimeout(resetAll, 680);
}

const K = 18, D = 3.6, PK = 4, PD = 2.8;

function springStep(cur, t, v, dt) {
  const f = (t - cur) * K - v * D;
  const nv = v + f * dt;
  return { p: cur + nv * dt, v: nv };
}
function posStep(cur, t, v, dt) {
  const f = (t - cur) * PK - v * PD;
  const nv = v + f * dt;
  return { p: cur + nv * dt, v: nv };
}
function applySpring(obj, key, dt) {
  for (const ax of ['x','y','z']) {
    const s = springStep(obj.rotation[ax], tgt[key][ax], vel[key][ax], dt);
    obj.rotation[ax] = s.p;
    vel[key][ax] = s.v;
  }
}

// ── Render Loop ───────────────────────────────────────────────────────────────
let t0 = performance.now(), idle = 0;

(function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - t0) / 1000, 0.05);
  t0 = now; idle += dt;

  // Beat-driven dancing
  if (checkBeat()) triggerMove();

  applySpring(LSP, 'LSP', dt);
  applySpring(RSP, 'RSP', dt);
  applySpring(LHP, 'LHP', dt);
  applySpring(RHP, 'RHP', dt);
  applySpring(figure, 'fig', dt);

  for (const ax of ['x','z']) {
    const s = posStep(posCur[ax], posT[ax], posV[ax], dt);
    posCur[ax] = s.p; posV[ax] = s.v;
  }
  figure.position.x = posCur.x;
  figure.position.z = posCur.z;

  torso.scale.y     = 1 + Math.sin(idle * 1.05) * 0.016;
  figure.position.y = Math.sin(idle * 0.95) * 0.03;
  head.rotation.y   = Math.sin(idle * 0.4) * 0.09;

  renderer.render(scene, camera);
})();

// ── Input ─────────────────────────────────────────────────────────────────────
function onClickEvt(e) {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  triggerMove();
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `left:${e.clientX}px;top:${e.clientY}px`;
  document.getElementById('ripples').appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}
function onKeyEvt(e) { if (!e.repeat) triggerMove(); }

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
